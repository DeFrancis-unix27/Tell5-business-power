[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --strict-markers
    --disable-warnings
    --tb=short
markers =
    unit: Unit tests for individual functions
    integration: Integration tests for API endpoints
    webhook: Tests for Twilio webhook
    auth: Tests for authentication
    security: Tests for security features
