<svg width="512" height="512" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Tell5 icon</title>
  <desc>Tell5 brand icon — dark rounded square with a teal speech bubble containing the number 5</desc>

  <style>
    .bg-sq { fill: #0a0c0f; }
    .bubble { fill: #00e5b0; }
    .five { fill: #0a0c0f; font-family: 'Arial Black', Arial, sans-serif; font-weight: 900; font-size: 220px; letter-spacing: -8px; }
    .dot { fill: #00e5b0; }
    .grid-line { stroke: rgba(0,229,176,0.07); stroke-width: 1; }
  </style>

  <!-- Background rounded square -->
  <rect class="bg-sq" x="60" y="60" width="560" height="560" rx="120"/>

  <!-- Subtle grid texture -->
  <clipPath id="sq-clip"><rect x="60" y="60" width="560" height="560" rx="120"/></clipPath>
  <g clip-path="url(#sq-clip)">
    <line class="grid-line" x1="60" y1="140" x2="620" y2="140"/>
    <line class="grid-line" x1="60" y1="220" x2="620" y2="220"/>
    <line class="grid-line" x1="60" y1="300" x2="620" y2="300"/>
    <line class="grid-line" x1="60" y1="380" x2="620" y2="380"/>
    <line class="grid-line" x1="60" y1="460" x2="620" y2="460"/>
    <line class="grid-line" x1="60" y1="540" x2="620" y2="540"/>
    <line class="grid-line" x1="140" y1="60" x2="140" y2="620"/>
    <line class="grid-line" x1="220" y1="60" x2="220" y2="620"/>
    <line class="grid-line" x1="300" y1="60" x2="300" y2="620"/>
    <line class="grid-line" x1="380" y1="60" x2="380" y2="620"/>
    <line class="grid-line" x1="460" y1="60" x2="460" y2="620"/>
    <line class="grid-line" x1="540" y1="60" x2="540" y2="620"/>
  </g>

  <!-- Speech bubble body -->
  <rect class="bubble" x="128" y="140" width="424" height="310" rx="44"/>

  <!-- Bubble tail -->
  <polygon class="bubble" points="188,448 148,530 260,448"/>

  <!-- "5" numeral -->
  <text class="five" x="340" y="424" text-anchor="middle">5</text>

  <!-- Accent dot -->
  <circle class="dot" cx="530" cy="558" r="18"/>
</svg>
